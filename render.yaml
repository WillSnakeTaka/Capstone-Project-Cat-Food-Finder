services:
  - type: web
    name: catcart-app
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm --prefix server install && npm run build
    startCommand: npm --prefix server start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: USE_FAKE_DB
        value: true
      - key: CLIENT_ORIGIN
        sync: false
      - key: JWT_SECRET
        sync: false
    disks:
      - name: catcart-data
        mountPath: /opt/render/project/src/server/data
        sizeGB: 1
